    <text font-family="monospace" font-size="12" fill="#2dd4bf" x="36" y="240">nobrudev</text>
    <text font-family="monospace" font-size="12" fill="#4d5566" x="108" y="240">❯</text>
    <rect class="cursor" x="122" y="228" width="8" height="14" fill="#2dd4bf"/>
