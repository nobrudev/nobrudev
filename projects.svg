<svg width="100%" viewBox="0 0 680 320" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Projetos - nobrudev</title>
  <desc>Terminal animado com os projetos de nobrudev</desc>
  <defs>
    <style>
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes fadein1 { 0%,15%{opacity:0} 16%,100%{opacity:1} }
      @keyframes fadein2 { 0%,32%{opacity:0} 33%,100%{opacity:1} }
      @keyframes fadein3 { 0%,49%{opacity:0} 50%,100%{opacity:1} }
      @keyframes scanline { 0%{transform:translateY(0)} 100%{transform:translateY(320px)} }
      .cursor { animation: blink 1.1s step-end infinite; }
      .row1 { animation: fadein1 3.5s ease forwards; }
      .row2 { animation: fadein2 3.5s ease forwards; }
      .row3 { animation: fadein3 3.5s ease forwards; }
      .scan { animation: scanline 4s linear infinite; opacity: 0.03; }
    </style>
  </defs>

  <rect width="680" height="320" rx="12" fill="#0d0d0f"/>
  <rect class="scan" x="0" y="0" width="680" height="3" fill="#2dd4bf"/>

  <rect x="0" y="0" width="680" height="32" rx="12" fill="#161618"/>
  <rect x="0" y="20" width="680" height="12" fill="#161618"/>
  <circle cx="22" cy="16" r="5" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="5" fill="#febc2e"/>
  <circle cx="58" cy="16" r="5" fill="#28c840"/>
  <text font-family="monospace" font-size="12" fill="#555" text-anchor="middle" x="340" y="21">nobrudev — bash</text>

  <text font-family="monospace" font-size="12" fill="#4d5566" x="24" y="60">~</text>
  <text font-family="monospace" font-size="12" fill="#2dd4bf" x="36" y="60">nobrudev</text>
  <text font-family="monospace" font-size="12" fill="#4d5566" x="108" y="60">❯</text>
  <text font-family="monospace" font-size="12" fill="#f472b6" x="122" y="60">ls ./projects</text>

