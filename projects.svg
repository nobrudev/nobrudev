      <text font-family="monospace" font-size="12" fill="#2a2a2e" x="159" y="90">──────────────────────────────────</text>
      <text font-family="monospace" font-size="12" fill="#f472b6" x="420" y="90">loja virtual + chatbot whatsapp</text>
      <text font-family="monospace" font-size="10" fill="#4d5566" x="54" y="106">HTML · CSS · JS</text>
